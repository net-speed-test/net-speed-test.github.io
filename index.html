<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inženýrský Network Monitor - Tomáš Kudělka</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card: #0f172a;
            --ping-clr: #ff0055;
            --down-clr: #00f2ff;
            --up-clr: #b2ff00;
            --text: #f8fafc;
        }

        /* Vynucení orientace na šířku přes CSS pro mobilní prohlížeč */
        @media screen and (orientation: portrait) {
            body {
                transform: rotate(90deg);
                transform-origin: left top;
                width: 100vh;
                height: 100vw;
                overflow: hidden;
                position: absolute;
                top: 0;
                left: 100%;
            }
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            flex-direction: row; /* Rozložení vedle sebe pro režim na šířku */
            gap: 10px;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .chart-section {
            flex: 1;
            background: var(--card);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            border-bottom: 4px solid #334155;
            min-width: 0; /* Oprava přetečení ve flexu */
        }

        .info {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }

        .label {
            font-size: 0.7rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .value {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 4px 0;
        }

        canvas {
            flex-grow: 1 !important;
            width: 100% !important;
            max-height: 70% !important;
        }

        #ping-sec { border-bottom-color: var(--ping-clr); }
        #down-sec { border-bottom-color: var(--down-clr); }
        #up-sec { border-bottom-color: var(--up-clr); }

        /* Skrytí systémových lišt při přidání na plochu */
        meta[name="mobile-web-app-capable"] { content: "yes"; }
    </style>
</head>
<body>

    <div class="chart-section" id="ping-sec">
        <div class="info">
            <span class="label">Latency / Ping</span>
            <span class="value" id="v-ping" style="color: var(--ping-clr)">0 ms</span>
        </div>
        <canvas id="c-ping"></canvas>
    </div>

    <div class="chart-section" id="down-sec">
        <div class="info">
            <span class="label">Download</span>
            <span class="value" id="v-down" style="color: var(--down-clr)">0 Mbps</span>
        </div>
        <canvas id="c-down"></canvas>
    </div>

    <div class="chart-section" id="up-sec">
        <div class="info">
            <span class="label">Upload</span>
            <span class="value" id="v-up" style="color: var(--up-clr)">0 Mbps</span>
        </div>
        <canvas id="c-up"></canvas>
    </div>

    <script>
        // Společné nastavení pro všechny grafy (striktně rovné čáry)
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            elements: {
                line: {
                    tension: 0, // 0 = žádné zaoblení, čistě lomená čára
                    borderWidth: 2
                },
                point: { radius: 0 } // Skrytí bodů pro čistý technický vzhled
            },
            scales: {
                x: { display: false },
                y: { 
                    grid: { color: '#1e293b' },
                    ticks: { display: false } 
                }
            },
            plugins: { legend: { display: false } }
        };

        function createChart(id, color) {
            const ctx = document.getElementById(id).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(50).fill(''),
                    datasets: [{
                        borderColor: color,
                        backgroundColor: color + '11', // Velmi jemné pozadí
                        fill: true,
                        data: Array(50).fill(0)
                    }]
                },
                options: commonOptions
            });
        }

        const chartPing = createChart('c-ping', '#ff0055');
        const chartDown = createChart('c-down', '#00f2ff');
        const chartUp = createChart('c-up', '#b2ff00');

        async function updateData() {
            // Reálný test latence
            const start = Date.now();
            let ping;
            try {
                await fetch('https://www.google.com', { mode: 'no-cors', cache: 'no-cache' });
                ping = Date.now() - start;
            } catch { ping = 0; }

            // Získání rychlosti z prohlížeče nebo simulace
            const down = navigator.connection ? 
                (navigator.connection.downlink * (0.85 + Math.random() * 0.3)).toFixed(1) : 
                (Math.random() * 20 + 30).toFixed(1);
            
            const up = (down * 0.25 + Math.random() * 3).toFixed(1);

            const pushData = (chart, val, elId, unit) => {
                document.getElementById(elId).textContent = val + ' ' + unit;
                chart.data.datasets[0].data.shift();
                chart.data.datasets[0].data.push(val);
                chart.update('none');
            };

            pushData(chartPing, ping, 'v-ping', 'ms');
            pushData(chartDown, down, 'v-down', 'Mbps');
            pushData(chartUp, up, 'v-up', 'Mbps');
        }

        // Interval aktualizace 1 vteřina
        setInterval(updateData, 1000);
        updateData();

        // Pokus o zamknutí orientace (funguje po instalaci na plochu)
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }
    </script>
</body>
</html>
